<script>
(function() {
  // ----- Data from backend (only cycle metadata and initial tree) -----
  let cycleMetadata = [];
  let initialTree = [];
  try {
    cycleMetadata = {{ result.cycle_metadata|tojson|safe if result and result.cycle_metadata else '[]' }};
    initialTree = {{ result.initial_cycle_data|tojson|safe if result and result.initial_cycle_data else '[]' }};
  } catch(e) {
    cycleMetadata = [];
    initialTree = [];
    console.warn('cycle data not available');
  }

  // Original birth data for panels
  const birthData = {
    md: '{{ result.birth_md }}',
    ad: '{{ result.birth_ad }}',
    pd: '{{ result.birth_pd }}',
    sd: '{{ result.birth_sd }}',
    pr: '{{ result.birth_pr }}'
  };
  // Find the offset 0 entry to get the original md start
  let offsetZero = cycleMetadata.find(m => m.offset === 0);
  const originalMdStart = offsetZero ? new Date(offsetZero.start_iso) : new Date();
  let currentTree = initialTree;  // will be updated when cycle changes
  let currentMdStart = originalMdStart;

  // ----- Mapping full names to abbreviations -----
  const FULL_TO_ABBR = {
    'Sun': 'Su', 'Moon': 'Mo', 'Mars': 'Ma', 'Mercury': 'Me',
    'Jupiter': 'Ju', 'Venus': 'Ve', 'Saturn': 'Sa', 'Rahu': 'Ra', 'Ketu': 'Ke'
  };
  const ABBR_TO_FULL = {};
  for (const [full, abbr] of Object.entries(FULL_TO_ABBR)) {
    ABBR_TO_FULL[abbr.toLowerCase()] = full;
  }

  function normalizeAbbr(input) {
    if (!input) return null;
    const lower = input.toLowerCase();
    for (const [full, abbr] of Object.entries(FULL_TO_ABBR)) {
      if (abbr.toLowerCase() === lower) return abbr;
    }
    return null;
  }

  function formatDate(isoStr) {
    if (!isoStr) return '—';
    const d = new Date(isoStr);
    return d.toLocaleString('en-GB', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  // ============================================================
  //  POPULATE PANEL (generic)
  // ============================================================
  function populatePanel(prefix, period) {
    const levels = ['MD', 'AD', 'PD', 'SD', 'PR'];
    const keys = ['md', 'ad', 'pd', 'sd', 'pr'];
    for (let i = 0; i < levels.length; i++) {
      const key = keys[i];
      const levelObj = period ? period[key] : null;
      const lord = levelObj ? levelObj.lord : null;
      const end = levelObj ? levelObj.end : null;
      const lordEl = document.getElementById(prefix + levels[i]);
      const dateEl = document.getElementById(prefix + levels[i] + 'End');
      if (lordEl) {
        lordEl.textContent = lord ? FULL_TO_ABBR[lord] || lord : '—';
      }
      if (dateEl) {
        dateEl.textContent = end ? formatDate(end) : '—';
      }
    }
  }

  // ============================================================
  //  FIND PERIOD AT TIME (given tree and mdStart)
  // ============================================================
  function findPeriodAtTime(targetTime, tree, mdStart) {
    if (!tree || !tree.length) return null;

    for (let mi = 0; mi < tree.length; mi++) {
      const mdItem = tree[mi];
      const mdStartTime = (mi === 0) ? mdStart : new Date(tree[mi-1].end);
      const mdEndTime = new Date(mdItem.end);
      if (targetTime < mdStartTime || targetTime > mdEndTime) continue;

      const adChildren = mdItem.children || [];
      for (let ai = 0; ai < adChildren.length; ai++) {
        const adItem = adChildren[ai];
        const adStartTime = (ai === 0) ? mdStartTime : new Date(adChildren[ai-1].end);
        const adEndTime = new Date(adItem.end);
        if (targetTime < adStartTime || targetTime > adEndTime) continue;

        const pdChildren = adItem.children || [];
        for (let pi = 0; pi < pdChildren.length; pi++) {
          const pdItem = pdChildren[pi];
          const pdStartTime = (pi === 0) ? adStartTime : new Date(pdChildren[pi-1].end);
          const pdEndTime = new Date(pdItem.end);
          if (targetTime < pdStartTime || targetTime > pdEndTime) continue;

          const sdChildren = pdItem.children || [];
          for (let si = 0; si < sdChildren.length; si++) {
            const sdItem = sdChildren[si];
            const sdStartTime = (si === 0) ? pdStartTime : new Date(sdChildren[si-1].end);
            const sdEndTime = new Date(sdItem.end);
            if (targetTime < sdStartTime || targetTime > sdEndTime) continue;

            const prChildren = sdItem.children || [];
            for (let ri = 0; ri < prChildren.length; ri++) {
              const prItem = prChildren[ri];
              const prStartTime = (ri === 0) ? sdStartTime : new Date(prChildren[ri-1].end);
              const prEndTime = new Date(prItem.end);
              if (targetTime >= prStartTime && targetTime < prEndTime) {
                return {
                  md: mdItem, ad: adItem, pd: pdItem, sd: sdItem, pr: prItem
                };
              }
            }
          }
        }
      }
    }
    return null;
  }

  // ============================================================
  //  FIND PERIOD BY LORDS (given tree)
  // ============================================================
  function findPeriodByLords(mdLord, adLord, pdLord, sdLord, prLord, tree) {
    if (mdLord && adLord && pdLord && sdLord && prLord) {
      for (let mi = 0; mi < tree.length; mi++) {
        const mdItem = tree[mi];
        if (mdItem.lord !== mdLord) continue;
        for (let ai = 0; ai < mdItem.children.length; ai++) {
          const adItem = mdItem.children[ai];
          if (adItem.lord !== adLord) continue;
          for (let pi = 0; pi < adItem.children.length; pi++) {
            const pdItem = adItem.children[pi];
            if (pdItem.lord !== pdLord) continue;
            for (let si = 0; si < pdItem.children.length; si++) {
              const sdItem = pdItem.children[si];
              if (sdItem.lord !== sdLord) continue;
              for (let ri = 0; ri < sdItem.children.length; ri++) {
                const prItem = sdItem.children[ri];
                if (prItem.lord === prLord) {
                  return { md: mdItem, ad: adItem, pd: pdItem, sd: sdItem, pr: prItem };
                }
              }
            }
          }
        }
      }
    }
    if (mdLord && adLord && pdLord && sdLord) {
      for (let mi = 0; mi < tree.length; mi++) {
        const mdItem = tree[mi];
        if (mdItem.lord !== mdLord) continue;
        for (let ai = 0; ai < mdItem.children.length; ai++) {
          const adItem = mdItem.children[ai];
          if (adItem.lord !== adLord) continue;
          for (let pi = 0; pi < adItem.children.length; pi++) {
            const pdItem = adItem.children[pi];
            if (pdItem.lord !== pdLord) continue;
            for (let si = 0; si < pdItem.children.length; si++) {
              const sdItem = pdItem.children[si];
              if (sdItem.lord !== sdLord) continue;
              return { md: mdItem, ad: adItem, pd: pdItem, sd: sdItem, pr: null };
            }
          }
        }
      }
    }
    if (mdLord && adLord && pdLord) {
      for (let mi = 0; mi < tree.length; mi++) {
        const mdItem = tree[mi];
        if (mdItem.lord !== mdLord) continue;
        for (let ai = 0; ai < mdItem.children.length; ai++) {
          const adItem = mdItem.children[ai];
          if (adItem.lord !== adLord) continue;
          for (let pi = 0; pi < adItem.children.length; pi++) {
            const pdItem = adItem.children[pi];
            if (pdItem.lord !== pdLord) continue;
            return { md: mdItem, ad: adItem, pd: pdItem, sd: null, pr: null };
          }
        }
      }
    }
    if (mdLord && adLord) {
      for (let mi = 0; mi < tree.length; mi++) {
        const mdItem = tree[mi];
        if (mdItem.lord !== mdLord) continue;
        for (let ai = 0; ai < mdItem.children.length; ai++) {
          const adItem = mdItem.children[ai];
          if (adItem.lord !== adLord) continue;
          return { md: mdItem, ad: adItem, pd: null, sd: null, pr: null };
        }
      }
    }
    if (mdLord) {
      for (let mi = 0; mi < tree.length; mi++) {
        const mdItem = tree[mi];
        if (mdItem.lord === mdLord) {
          return { md: mdItem, ad: null, pd: null, sd: null, pr: null };
        }
      }
    }
    return null;
  }

  // ============================================================
  //  LEFT NAVIGATOR – with cycle dropdown (lazy load)
  // ============================================================
  let leftCurrentLevel = 0;
  let leftCurrentPath = [];
  let leftCurrentTree = currentTree;
  let leftCurrentMdStart = currentMdStart;

  const listEl = document.getElementById('dashaList');
  const backBtn = document.getElementById('navBackBtn');
  const leftSelector = document.getElementById('cycleSelectorLeft');

  // Populate left dropdown – show only year ranges (no labels)
  leftSelector.innerHTML = '';
  if (cycleMetadata.length > 0) {
    // Sort by offset to keep order: past (-1), then 0,1,2...
    const sorted = [...cycleMetadata].sort((a,b) => a.offset - b.offset);
    sorted.forEach((meta) => {
      const opt = document.createElement('option');
      opt.value = meta.offset;
      // Only years: "start-end"
      opt.textContent = `${meta.start_year}–${meta.end_year}`;
      leftSelector.appendChild(opt);
    });
    // select the offset 0 entry
    leftSelector.value = 0;
  } else {
    const opt = document.createElement('option');
    opt.value = 0;
    opt.textContent = 'Cycle 0';
    leftSelector.appendChild(opt);
  }

  function getItemsAtLevel(level, path, tree) {
    let node = tree;
    for (let i = 0; i < level; i++) {
      if (i < path.length) {
        const idx = path[i];
        if (node && node[idx] && node[idx].children) {
          node = node[idx].children;
        } else {
          return [];
        }
      } else {
        return [];
      }
    }
    return node || [];
  }

  function getAncestorLords(level, path, tree) {
    const lords = [];
    let node = tree;
    for (let i = 0; i < level; i++) {
      if (i < path.length) {
        const idx = path[i];
        if (node && node[idx]) {
          lords.push(node[idx].lord);
          node = node[idx].children;
        } else {
          break;
        }
      } else {
        break;
      }
    }
    return lords;
  }

  function getFullName(level, path, rowIdx, tree) {
    const items = getItemsAtLevel(level, path, tree);
    if (!items || rowIdx >= items.length) return '';
    const ancestors = getAncestorLords(level, path, tree);
    const currentLord = items[rowIdx].lord;
    const nameParts = ancestors.concat(currentLord).map(l => FULL_TO_ABBR[l] || l);
    return nameParts.join('/');
  }

  function renderLeftNavigator() {
    const items = getItemsAtLevel(leftCurrentLevel, leftCurrentPath, leftCurrentTree);
    if (!items || items.length === 0) {
      listEl.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3);">No entries</div>';
      return;
    }
    let html = '';
    items.forEach((item, idx) => {
      const fullName = getFullName(leftCurrentLevel, leftCurrentPath, idx, leftCurrentTree);
      const dateStr = item.end ? formatDate(item.end) : '—';
      const isActive = (leftCurrentLevel < 4 && leftCurrentPath.length > leftCurrentLevel && leftCurrentPath[leftCurrentLevel] === idx);
      html += `
        <div class="dasha-row ${isActive ? 'active-row' : ''}" data-idx="${idx}">
          <span class="dasha-name">${fullName}</span>
          <span class="dasha-date">${dateStr}</span>
        </div>
      `;
    });
    listEl.innerHTML = html;
    backBtn.disabled = (leftCurrentLevel === 0);
  }

  function goToLevel(level, path) {
    if (level > 4) level = 4;
    if (level < 0) level = 0;
    leftCurrentLevel = level;
    leftCurrentPath = path.slice(0, level);
    renderLeftNavigator();
  }

  function drillDown(idx) {
    if (leftCurrentLevel >= 4) return;
    const items = getItemsAtLevel(leftCurrentLevel, leftCurrentPath, leftCurrentTree);
    if (!items || idx >= items.length) return;
    const item = items[idx];
    if (!item.children || item.children.length === 0) return;
    const newPath = leftCurrentPath.slice(0, leftCurrentLevel);
    newPath.push(idx);
    goToLevel(leftCurrentLevel + 1, newPath);
  }

  function goBack() {
    if (leftCurrentLevel === 0) return;
    const newPath = leftCurrentPath.slice(0, leftCurrentLevel - 1);
    goToLevel(leftCurrentLevel - 1, newPath);
  }

  listEl.addEventListener('click', function(e) {
    const row = e.target.closest('.dasha-row');
    if (!row) return;
    const idx = parseInt(row.dataset.idx, 10);
    if (!isNaN(idx)) drillDown(idx);
  });

  backBtn.addEventListener('click', goBack);

  // ----- Left dropdown change → fetch new cycle data -----
  leftSelector.addEventListener('change', function() {
    const offset = parseInt(this.value);
    // find metadata for this offset
    const meta = cycleMetadata.find(m => m.offset === offset);
    if (meta) {
      fetch(`/api/cycle-data?offset=${offset}&md_start=${encodeURIComponent(originalMdStart.toISOString())}&nak_lord=${encodeURIComponent('{{ result.nak_lord }}')}`)
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            leftCurrentTree = data.data;
            leftCurrentMdStart = new Date(meta.start_iso);
            goToLevel(0, []);
          } else {
            console.error('Failed to fetch cycle data:', data.error);
          }
        })
        .catch(err => console.error('Fetch error:', err));
    }
  });

  // Initial render with cycle 0 (offset 0)
  goToLevel(0, []);

  // ============================================================
  //  BIRTH PANEL (fixed, uses original birth data)
  // ============================================================
  const birthPeriod = findPeriodByLords(
    birthData.md, birthData.ad, birthData.pd, birthData.sd, birthData.pr,
    initialTree
  );
  if (birthPeriod) {
    populatePanel('birth', {
      md: birthPeriod.md, ad: birthPeriod.ad, pd: birthPeriod.pd,
      sd: birthPeriod.sd, pr: birthPeriod.pr
    });
  } else {
    populatePanel('birth', null);
  }

  // ============================================================
  //  TODAY PANEL – uses initialTree (cycle 0)
  // ============================================================
  function updateToday() {
    const now = new Date();
    const period = findPeriodAtTime(now, initialTree, originalMdStart);
    if (period) {
      populatePanel('today', {
        md: period.md, ad: period.ad, pd: period.pd,
        sd: period.sd, pr: period.pr
      });
    } else {
      populatePanel('today', null);
    }
  }
  updateToday();

  // ============================================================
  //  RANDOM DATE – use currently loaded cycle tree (from dropdown)
  // ============================================================
  function findCycleForDate(dt) {
    // Determine which cycle (by offset) the date falls into
    for (let i = 0; i < cycleMetadata.length - 1; i++) {
      const start = new Date(cycleMetadata[i].start_iso);
      const end = new Date(cycleMetadata[i+1].start_iso);
      if (dt >= start && dt < end) return cycleMetadata[i].offset;
    }
    const lastStart = new Date(cycleMetadata[cycleMetadata.length-1].start_iso);
    if (dt >= lastStart) return cycleMetadata[cycleMetadata.length-1].offset;
    return 0;
  }

  document.getElementById('randomDateBtn').addEventListener('click', function() {
    const dateVal = document.getElementById('randomDate').value;
    const timeVal = document.getElementById('randomTime').value;
    if (!dateVal) {
      populatePanel('random', null);
      return;
    }
    const dt = new Date(dateVal + 'T' + (timeVal || '12:00:00'));
    if (isNaN(dt)) {
      populatePanel('random', null);
      return;
    }
    const cycleIdx = findCycleForDate(dt);
    // Use the current tree (which is the one selected in left dropdown)
    // If the date falls in a different cycle, user should select that cycle from dropdown first.
    const period = findPeriodAtTime(dt, leftCurrentTree, leftCurrentMdStart);
    if (period) {
      populatePanel('random', {
        md: period.md, ad: period.ad, pd: period.pd,
        sd: period.sd, pr: period.pr
      });
    } else {
      populatePanel('random', null);
    }
  });

  // ============================================================
  //  MANUAL LOOKUP – uses its own dropdown to fetch cycle
  // ============================================================
  const manualSelector = document.getElementById('cycleSelectorManual');
  manualSelector.innerHTML = '';
  if (cycleMetadata.length > 0) {
    const sorted = [...cycleMetadata].sort((a,b) => a.offset - b.offset);
    sorted.forEach((meta) => {
      const opt = document.createElement('option');
      opt.value = meta.offset;
      // Only years: "start-end"
      opt.textContent = `${meta.start_year}–${meta.end_year}`;
      manualSelector.appendChild(opt);
    });
    // select offset 0
    manualSelector.value = 0;
  } else {
    const opt = document.createElement('option');
    opt.value = 0;
    opt.textContent = 'Cycle 0';
    manualSelector.appendChild(opt);
  }

  let manualTree = initialTree;
  let manualMdStart = originalMdStart;

  manualSelector.addEventListener('change', function() {
    const offset = parseInt(this.value);
    const meta = cycleMetadata.find(m => m.offset === offset);
    if (meta) {
      fetch(`/api/cycle-data?offset=${offset}&md_start=${encodeURIComponent(originalMdStart.toISOString())}&nak_lord=${encodeURIComponent('{{ result.nak_lord }}')}`)
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            manualTree = data.data;
            manualMdStart = new Date(meta.start_iso);
          } else {
            console.error('Failed to fetch cycle data for manual:', data.error);
          }
        })
        .catch(err => console.error('Fetch error:', err));
    }
  });
  // Trigger initial fetch for cycle 0
  manualSelector.dispatchEvent(new Event('change'));

  const manualInput = document.getElementById('manualInput');
  manualInput.addEventListener('input', function() {
    let raw = this.value.replace(/[^a-zA-Z]/g, '');
    if (raw.length > 10) raw = raw.slice(0, 10);
    const chunks = [];
    for (let i = 0; i < raw.length; i += 2) {
      chunks.push(raw.slice(i, i + 2));
    }
    const formatted = chunks.join('/');
    if (this.value !== formatted) {
      this.value = formatted;
      this.setSelectionRange(formatted.length, formatted.length);
    }
  });

  document.getElementById('manualDashaBtn').addEventListener('click', function() {
    const inputVal = manualInput.value.trim();
    if (!inputVal) {
      populatePanel('manual', null);
      return;
    }
    const parts = inputVal.split('/').map(s => s.trim()).filter(s => s.length > 0);
    if (parts.length === 0) {
      populatePanel('manual', null);
      return;
    }

    const normalized = parts.map(p => normalizeAbbr(p));
    const invalidIndex = normalized.findIndex(n => n === null);
    if (invalidIndex !== -1) {
      populatePanel('manual', null);
      return;
    }

    const fullNames = normalized.map(abbr => ABBR_TO_FULL[abbr.toLowerCase()]);
    while (fullNames.length < 5) fullNames.push(null);
    const [md, ad, pd, sd, pr] = fullNames;

    const period = findPeriodByLords(md, ad, pd, sd, pr, manualTree);
    if (period) {
      populatePanel('manual', {
        md: period.md, ad: period.ad, pd: period.pd,
        sd: period.sd, pr: period.pr
      });
    } else {
      populatePanel('manual', null);
    }
  });

})();
</script>
